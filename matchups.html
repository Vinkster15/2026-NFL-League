<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matchups · 2026 NFL League</title>


  <style>
    :root {
      --bg:          #0a0c0f;
      --surface:     #111418;
      --surface2:    #181c22;
      --border:      #232830;
      --border2:     #2e3540;
      --accent:      #e8a020;
      --accent2:     #c47010;
      --green:       #2ecc71;
      --red:         #e74c3c;
      --muted:       #5a6270;
      --text:        #d8dde6;
      --text-dim:    #8892a0;
      --heading:     #f0f4f8;
      --radius:      4px;
      --font-ui:     'Calibri', 'Candara', sans-serif;
      --font-mono:   'Calibri', 'Candara', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }

    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 16px;
    }
    .logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .04em;
      color: var(--heading);
      white-space: nowrap;
    }
    .logo span { color: var(--accent); }
    nav { display: flex; gap: 4px; flex-wrap: wrap; }
    nav a {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 6px 10px;
      border-radius: var(--radius);
      transition: color .15s, background .15s;
    }
    nav a:hover, nav a:focus {
      color: var(--accent);
      background: rgba(232,160,32,.08);
      text-decoration: none;
    }
    nav a.active {
      color: var(--accent);
      background: rgba(232,160,32,.1);
    }

    .hero {
      background: linear-gradient(135deg, #0d1117 0%, #141920 60%, #1a1000 100%);
      border-bottom: 1px solid var(--border);
      padding: 40px 16px 32px;
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      letter-spacing: .03em;
      color: var(--heading);
      line-height: 1.1;
    }
    .hero h1 span { color: var(--accent); }

    .section { padding: 40px 16px; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--accent);
      border-left: 3px solid var(--accent);
      padding-left: 10px;
      margin-bottom: 24px;
    }
    h2.block-heading {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 900;
      color: var(--heading);
      letter-spacing: .02em;
      margin-bottom: 20px;
    }

    .matchups-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .matchups-controls select {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      padding: 7px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      outline: none;
    }
    .matchups-controls select:focus { border-color: var(--accent); }
    .btn-refresh {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 7px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-refresh:hover { background: var(--accent); color: #000; }

    /* Matchups table box */
    .matchups-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .matchups-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }
    .matchups-table thead tr {
      background: var(--surface2);
      border-bottom: 2px solid var(--accent);
    }
    .matchups-table th {
      padding: 11px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }
    .matchups-table th.col-home,
    .matchups-table th.col-away { text-align: left; }
    .matchups-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .matchups-table tr:last-child td { border-bottom: none; }
    .matchups-table tr:hover td { background: rgba(255,255,255,.025); }

    .td-game {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      width: 60px;
    }
    .td-team {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .td-team.winner { color: var(--green); }
    .td-team.loser  { color: var(--muted); }
    .td-team .dk-user {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      margin-left: 6px;
    }
    .td-score {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      color: var(--heading);
      white-space: nowrap;
      width: 110px;
    }
    .td-score .vs-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .td-score .score-sep { color: var(--muted); margin: 0 4px; font-weight: 400; }
    .td-home {
      text-align: right;
    }
    #matchups-empty {
      font-size: 13px;
      color: var(--muted);
      padding: 24px 16px;
    }
    @media (max-width: 560px) {
      .td-score { font-size: 15px; }
    }

    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-left: 3px solid var(--green);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 12px 18px;
      border-radius: var(--radius);
      z-index: 300;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px 16px;
      text-align: center;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html" style="text-decoration:none">2026 <span>NFL</span> League</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="standings.html">Standings</a>
      <a href="matchups.html" class="active">Matchups</a>
    </nav>
  </div>
</header>

<section class="hero">
  <h1>Weekly <span>Matchups</span></h1>
</section>

<section class="section container" id="matchups">
  <p class="section-title">Schedule</p>
  <h2 class="block-heading">Weekly Matchups</h2>

  <div class="matchups-controls">
    <select id="matchups-week-filter" onchange="renderMatchups()">
      <option value="">Loading…</option>
    </select>
    <button class="btn-refresh" onclick="refreshMatchups()">↻ Refresh</button>
  </div>

  <div class="matchups-box" style="max-width:780px;margin:0 auto">
    <table class="matchups-table" id="matchups-table">
      <thead>
        <tr>
          <th class="col-game">#</th>
          <th class="col-away">Away</th>
          <th class="col-score">Score</th>
          <th class="col-home" style="text-align:right">Home</th>
        </tr>
      </thead>
      <tbody id="matchups-tbody">
        <tr><td colspan="5" id="matchups-empty" class="td-game" style="width:auto;text-align:left;color:var(--muted);font-size:13px">No matchups found for this week.</td></tr>
      </tbody>
    </table>
  </div>
</section>

<footer>
  <p>2026 NFL League · <a href="index.html">Home</a></p>
</footer>

<div id="toast" role="status" aria-live="polite"></div>

<script>
  const GOOGLE_SHEETS_CONFIG = {
    APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwyH3OWsW_pqlVC3aMKUJusr3BeFYT4Cd3fP_gQL4lA_OzF9FhSadMtNM0P55qZ0OUikw/exec',
    SHEET_PUBLIC_URL: 'https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/edit',
  };

  function isLive() {
    return GOOGLE_SHEETS_CONFIG.APPS_SCRIPT_URL.indexOf('YOUR_SCRIPT_ID') === -1;
  }

  const MOCK_LEAGUE = {
    conferences: [
      { id: 'afc', name: 'AFC' },
      { id: 'nfc', name: 'NFC' },
    ],
    teams: [
      { id: 't01', divId: 'afc-north', name: 'Baltimore Ravens'     },
      { id: 't02', divId: 'afc-north', name: 'Cincinnati Bengals'   },
      { id: 't03', divId: 'afc-north', name: 'Cleveland Browns'     },
      { id: 't04', divId: 'afc-north', name: 'Pittsburgh Steelers'  },
      { id: 't05', divId: 'afc-south', name: 'Houston Texans'       },
      { id: 't06', divId: 'afc-south', name: 'Indianapolis Colts'   },
      { id: 't07', divId: 'afc-south', name: 'Jacksonville Jaguars' },
      { id: 't08', divId: 'afc-south', name: 'Tennessee Titans'     },
      { id: 't09', divId: 'afc-east',  name: 'Buffalo Bills'        },
      { id: 't10', divId: 'afc-east',  name: 'Miami Dolphins'       },
      { id: 't11', divId: 'afc-east',  name: 'New England Patriots' },
      { id: 't12', divId: 'afc-east',  name: 'New York Jets'        },
      { id: 't13', divId: 'afc-west',  name: 'Denver Broncos'       },
      { id: 't14', divId: 'afc-west',  name: 'Kansas City Chiefs'   },
      { id: 't15', divId: 'afc-west',  name: 'Las Vegas Raiders'    },
      { id: 't16', divId: 'afc-west',  name: 'Los Angeles Chargers' },
      { id: 't17', divId: 'nfc-north', name: 'Chicago Bears'        },
      { id: 't18', divId: 'nfc-north', name: 'Detroit Lions'        },
      { id: 't19', divId: 'nfc-north', name: 'Green Bay Packers'    },
      { id: 't20', divId: 'nfc-north', name: 'Minnesota Vikings'    },
      { id: 't21', divId: 'nfc-south', name: 'Atlanta Falcons'      },
      { id: 't22', divId: 'nfc-south', name: 'Carolina Panthers'    },
      { id: 't23', divId: 'nfc-south', name: 'New Orleans Saints'   },
      { id: 't24', divId: 'nfc-south', name: 'Tampa Bay Buccaneers' },
      { id: 't25', divId: 'nfc-east',  name: 'Dallas Cowboys'       },
      { id: 't26', divId: 'nfc-east',  name: 'New York Giants'      },
      { id: 't27', divId: 'nfc-east',  name: 'Philadelphia Eagles'  },
      { id: 't28', divId: 'nfc-east',  name: 'Washington Commanders'},
      { id: 't29', divId: 'nfc-west',  name: 'Arizona Cardinals'    },
      { id: 't30', divId: 'nfc-west',  name: 'Los Angeles Rams'     },
      { id: 't31', divId: 'nfc-west',  name: 'San Francisco 49ers'  },
      { id: 't32', divId: 'nfc-west',  name: 'Seattle Seahawks'     },
    ],
  };

  const TEAM_ABBR = {
    'Baltimore Ravens':      'BAL',
    'Cincinnati Bengals':    'CIN',
    'Cleveland Browns':      'CLE',
    'Pittsburgh Steelers':   'PIT',
    'Houston Texans':        'HOU',
    'Indianapolis Colts':    'IND',
    'Jacksonville Jaguars':  'JAC',
    'Tennessee Titans':      'TEN',
    'Buffalo Bills':         'BUF',
    'Miami Dolphins':        'MIA',
    'New England Patriots':  'NE',
    'New York Jets':         'NYJ',
    'Denver Broncos':        'DEN',
    'Kansas City Chiefs':    'KC',
    'Las Vegas Raiders':     'LV',
    'Los Angeles Chargers':  'LAC',
    'Chicago Bears':         'CHI',
    'Detroit Lions':         'DET',
    'Green Bay Packers':     'GB',
    'Minnesota Vikings':     'MIN',
    'Atlanta Falcons':       'ATL',
    'Carolina Panthers':     'CAR',
    'New Orleans Saints':    'NO',
    'Tampa Bay Buccaneers':  'TB',
    'Dallas Cowboys':        'DAL',
    'New York Giants':       'NYG',
    'Philadelphia Eagles':   'PHI',
    'Washington Commanders': 'WAS',
    'Arizona Cardinals':     'ARI',
    'Los Angeles Rams':      'LAR',
    'San Francisco 49ers':   'SF',
    'Seattle Seahawks':      'SEA',
  };

  // ── Runtime state ──────────────────────────────────────────────
  let claimedTeams = {};
  window._claimUsernames = {};
  window._matchups = [];

  function allTeamsClaimed() {
    return Object.keys(claimedTeams).length >= MOCK_LEAGUE.teams.length;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
  }

  // ── Data loading ───────────────────────────────────────────────
  async function loadClaims() {
    if (!isLive()) {
      try {
        const raw = localStorage.getItem('gfl_claimed');
        claimedTeams = raw ? JSON.parse(raw) : {};
        const rawU = localStorage.getItem('gfl_usernames');
        window._claimUsernames = rawU ? JSON.parse(rawU) : {};
      } catch (e) {}
      return;
    }
    try {
      const res  = await fetch(GOOGLE_SHEETS_CONFIG.APPS_SCRIPT_URL + '?action=claims');
      const data = await res.json();
      if (data.success) {
        claimedTeams           = data.claims    || {};
        window._claimUsernames = data.usernames || {};
      }
    } catch (err) {
      console.warn('loadClaims failed', err);
    }
  }

  async function loadMatchups() {
    if (!isLive()) return [];
    try {
      const res  = await fetch(GOOGLE_SHEETS_CONFIG.APPS_SCRIPT_URL + '?action=matchups');
      const data = await res.json();
      return (data.success && data.matchups) ? data.matchups : [];
    } catch (err) {
      console.warn('loadMatchups failed', err);
      return [];
    }
  }

  // ── Render ─────────────────────────────────────────────────────
  function getPlayerForTeam(teamName) {
    if (!allTeamsClaimed()) return null;
    const team = MOCK_LEAGUE.teams.find(t => t.name === teamName);
    if (!team) return null;
    // Return DraftKings username — only visible once all 32 teams are claimed
    return (window._claimUsernames && window._claimUsernames[team.id]) || null;
  }

  function populateWeekFilter(keepWeek) {
    const weeks = [...new Set(window._matchups.map(m => Number(m.week)))].sort((a, b) => a - b);
    const sel   = document.getElementById('matchups-week-filter');
    sel.innerHTML = '';

    if (weeks.length === 0) {
      sel.innerHTML = '<option value="">No matchups yet</option>';
      return;
    }

    weeks.forEach(w => {
      const opt       = document.createElement('option');
      opt.value       = w;
      opt.textContent = 'Week ' + w;
      sel.appendChild(opt);
    });

    sel.value = (keepWeek && weeks.includes(Number(keepWeek))) ? keepWeek : weeks[weeks.length - 1];
  }

  function renderMatchups() {
    const sel     = document.getElementById('matchups-week-filter');
    const selWeek = Number(sel.value);
    const tbody   = document.getElementById('matchups-tbody');
    const week    = window._matchups.filter(m => Number(m.week) === selWeek);

    tbody.innerHTML = '';

    if (week.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" id="matchups-empty" style="padding:24px 16px;color:var(--muted);font-size:13px">No matchups found for this week.</td></tr>';
      return;
    }

    week.forEach((m, i) => {
      const played   = m.homeScore !== null && m.awayScore !== null;
      const homeWins = played && m.homeScore > m.awayScore;
      const awayWins = played && m.awayScore > m.homeScore;

      const homeAbbr = TEAM_ABBR[m.homeTeam] || m.homeTeam;
      const awayAbbr = TEAM_ABBR[m.awayTeam] || m.awayTeam;
      const homeDK   = getPlayerForTeam(m.homeTeam);
      const awayDK   = getPlayerForTeam(m.awayTeam);

      // Away: CAR - vinkster15 / Home: vinkster15 - CAR
      const awayLabel = awayDK
        ? `${awayAbbr}<span class="dk-user">- ${escHtml(awayDK)}</span>`
        : awayAbbr;
      const homeLabel = homeDK
        ? `<span class="dk-user">${escHtml(homeDK)} -</span>${homeAbbr}`
        : homeAbbr;

      const scoreCell = played
        ? `<span style="color:${awayWins ? 'var(--green)' : 'var(--muted)'}">${m.awayScore}</span><span class="score-sep">–</span><span style="color:${homeWins ? 'var(--green)' : 'var(--muted)'}">${m.homeScore}</span>`
        : `<span class="vs-label">VS</span>`;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-game">${i + 1}</td>
        <td class="td-team ${played ? (awayWins ? 'winner' : 'loser') : ''}">${awayLabel}</td>
        <td class="td-score">${scoreCell}</td>
        <td class="td-team td-home ${played ? (homeWins ? 'winner' : 'loser') : ''}">${homeLabel}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function refreshMatchups() {
    const prevWeek = document.getElementById('matchups-week-filter').value;
    await loadClaims();
    window._matchups = await loadMatchups();
    populateWeekFilter(prevWeek);
    renderMatchups();
  }

  // ── Boot ───────────────────────────────────────────────────────
  async function boot() {
    await loadClaims();
    window._matchups = await loadMatchups();
    populateWeekFilter();
    renderMatchups();
  }

  boot();
</script>
</body>
</html>
